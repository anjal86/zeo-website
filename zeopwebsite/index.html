<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Preconnect to own API/uploads origin so hero images load faster -->
  <link rel="preconnect" href="https://zeotourism.com">
  <link rel="dns-prefetch" href="https://zeotourism.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700;900&display=swap"
    rel="stylesheet">

  <!-- Default Meta Tags (route-specific tags are injected by React Helmet and build-time SEO prerendering) -->
  <title>Kailash Mansarovar Yatra & Nepal Tour Packages | Zeo Tourism</title>
  <meta name="description"
    content="Plan Kailash Mansarovar Yatra, Nepal pilgrimage tours, Muktinath Yatra, Everest Base Camp Trek and custom Nepal holidays with Zeo Tourism." />
  <meta name="keywords"
    content="Kailash Mansarovar Yatra, Kailash Yatra from Nepal, Nepal tour packages, Muktinath Yatra, Everest Base Camp Trek, Nepal travel agency" />
  <meta name="author" content="Zeo Tourism" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Kailash Mansarovar Yatra & Nepal Tour Packages | Zeo Tourism" />
  <meta property="og:description"
    content="Plan Kailash Mansarovar Yatra, Nepal pilgrimage tours, Muktinath Yatra, Everest Base Camp Trek and custom Nepal holidays with Zeo Tourism." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://zeotourism.com" />
  <meta property="og:image" content="https://zeotourism.com/images/og-image.jpg" />
  <meta property="og:site_name" content="Zeo Tourism" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Kailash Mansarovar Yatra & Nepal Tour Packages | Zeo Tourism" />
  <meta name="twitter:description"
    content="Plan Kailash Mansarovar Yatra, Nepal pilgrimage tours, Muktinath Yatra, Everest Base Camp Trek and custom Nepal holidays with Zeo Tourism." />
  <meta name="twitter:image" content="https://zeotourism.com/images/twitter-card.jpg" />

  <!-- Additional SEO Meta Tags -->
  <meta name="theme-color" content="#1e40af" />
  <link rel="canonical" href="https://zeotourism.com" />

  <!-- Static Structured Data Fallback -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": ["TravelAgency", "Organization"],
        "@id": "https://zeotourism.com/#organization",
        "name": "Zeo Tourism",
        "url": "https://zeotourism.com",
        "logo": "https://zeotourism.com/logo/zeo-logo.png",
        "description": "Nepal-based travel agency specializing in Kailash Mansarovar Yatra, Nepal pilgrimage tours, Muktinath Yatra, Himalayan treks, cultural tours and outbound travel packages.",
        "foundingDate": "2000",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Thamel, Kathmandu",
          "addressLocality": "Kathmandu",
          "addressRegion": "Bagmati Province",
          "addressCountry": "NP"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "info@zeotourism.com",
          "contactType": "customer service",
          "availableLanguage": ["English", "Hindi", "Nepali"]
        },
        "knowsAbout": [
          "Kailash Mansarovar Yatra",
          "Kailash Yatra from Nepal",
          "Kailash Yatra for Indian Citizens",
          "Kailash Yatra for NRI Travelers",
          "Muktinath Yatra",
          "Everest Base Camp Trek",
          "Nepal Tour Packages"
        ]
      }
    </script>
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "@id": "https://zeotourism.com/#website",
        "url": "https://zeotourism.com",
        "name": "Zeo Tourism",
        "publisher": {
          "@id": "https://zeotourism.com/#organization"
        }
      }
    </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>

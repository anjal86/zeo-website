server {
    listen 80;
    server_name www.zeotourism.com;
    return 301 https://zeotourism.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.zeotourism.com;

    ssl_certificate /etc/letsencrypt/live/zeotourism.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/zeotourism.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    return 301 https://zeotourism.com$request_uri;
}

server {
    server_name zeotourism.com;

    if ($request_uri ~* "(togel|mahjong|jackpot|slot|casino|gacor|scatter|anti-blokir|merah|mahjong333|merahtoto)") {
        return 410;
    }

    location /uploads/ {
        alias /var/www/zeo/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/zeotourism.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/zeotourism.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = zeotourism.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name zeotourism.com;
    return 404; # managed by Certbot
}
name: Blog SEO architecture inventory

on:
  push:
    branches:
      - agent/blog-seo-complete-system

permissions:
  contents: write

jobs:
  inventory:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/blog-seo-complete-system
          fetch-depth: 0

      - name: Build repository inventory
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '# Repository tree'
            find next-zeo -maxdepth 5 -type f \
              \( -name '*.ts' -o -name '*.tsx' -o -name '*.sql' -o -name '*.json' \) \
              | sort
            echo
            echo '# Post and SEO references'
            grep -RIn --exclude-dir=node_modules --exclude-dir=.next \
              -E 'admin/posts|CREATE TABLE.*posts|ALTER TABLE.*posts|post_redirect|Search Console|relatedPosts|BlogPost|MarkdownArticle|TableOfContents' \
              next-zeo | head -n 1200 || true
          } > .blog-seo-repo-map.txt

          {
            for file in \
              next-zeo/app/api/admin/posts/route.ts \
              next-zeo/app/api/admin/posts/[id]/route.ts \
              next-zeo/src/server/repositories/content.ts \
              next-zeo/src/components/Blog/BlogPost.tsx \
              next-zeo/src/components/Blog/MarkdownArticle.tsx \
              next-zeo/src/components/Blog/TableOfContents.tsx \
              next-zeo/app/blog/[slug]/page.tsx \
              next-zeo/src/lib/blogSeo.ts \
              next-zeo/package.json; do
              if [ -f "$file" ]; then
                echo "===== $file ====="
                sed -n '1,1200p' "$file"
                echo
              fi
            done
          } > .blog-seo-key-files.txt

      - name: Commit inventory
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .blog-seo-repo-map.txt .blog-seo-key-files.txt
          git commit -m 'chore: capture blog SEO implementation map'
          git push origin HEAD:agent/blog-seo-complete-system

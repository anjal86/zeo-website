name: Apply complete blog SEO system

on:
  push:
    branches:
      - agent/blog-seo-complete-system

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: zeo_test
          MYSQL_USER: zeo
          MYSQL_PASSWORD: zeo_test_password
          MYSQL_ROOT_PASSWORD: root_test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot_test_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      APP_URL: https://zeotourism.com
      NEXT_PUBLIC_APP_URL: https://zeotourism.com
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USER: zeo
      MYSQL_PASSWORD: zeo_test_password
      MYSQL_DATABASE: zeo_test
      MYSQL_CONNECTION_LIMIT: 5
      JWT_SECRET: blog-seo-validation-secret-0123456789-abcdefghijklmnopqrstuvwxyz-ABCDEFGHIJKLMNOPQRSTUVWXYZ
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: BlogSeoValidationPassword2026!
      STORAGE_DRIVER: local
      UPLOAD_DIR: /tmp/zeo-uploads
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/blog-seo-complete-system
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: next-zeo/package-lock.json

      - name: Reconstruct and apply implementation patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/seo-patch/part*.b64 | base64 --decode | gzip --decompress > /tmp/blog-seo.patch
          patch --dry-run -p1 < /tmp/blog-seo.patch
          patch -p1 < /tmp/blog-seo.patch
          rm -rf .github/seo-patch
          rm -f .github/workflows/blog-seo-apply.yml
          rm -f .github/workflows/blog-seo-recon.yml
          rm -f .blog-seo-repo-map.txt .blog-seo-key-files.txt
          git add -A
          git diff --cached --check

      - name: Install dependencies
        working-directory: next-zeo
        run: npm ci

      - name: Apply database migrations
        working-directory: next-zeo
        run: npm run db:migrate

      - name: Run regression suite
        working-directory: next-zeo
        run: npm run test:regression

      - name: Run lint
        working-directory: next-zeo
        run: npm run lint

      - name: Run TypeScript checks
        working-directory: next-zeo
        run: npm run typecheck

      - name: Build production application
        working-directory: next-zeo
        run: npm run build

      - name: Commit validated implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m 'feat: build complete blog SEO system'
          git push origin HEAD:agent/blog-seo-complete-system

name: UI and SEO Quality

on:
  pull_request:
    paths:
      - "next-zeo/**"
      - ".github/workflows/ui-seo-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-seo-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: next-zeo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: next-zeo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint changed UI and SEO files
        run: >-
          npx eslint
          app/layout.tsx
          app/page.tsx
          app/robots.ts
          app/sitemap.ts
          app/about/page.tsx
          app/activities/page.tsx
          app/blog/page.tsx
          app/contact/layout.tsx
          app/destinations/page.tsx
          app/tours/page.tsx
          src/components/Layout/PublicLayout.tsx

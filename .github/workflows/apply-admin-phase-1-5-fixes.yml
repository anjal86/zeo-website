name: Apply admin phase 1-5 fixes

on:
  push:
    branches:
      - agent/admin-phase-1-5-fixes
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

concurrency:
  group: admin-phase-1-5-fixes
  cancel-in-progress: false

jobs:
  apply-and-validate:
    if: github.head_ref == 'agent/admin-phase-1-5-fixes' || github.ref_name == 'agent/admin-phase-1-5-fixes'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/admin-phase-1-5-fixes
          fetch-depth: 0

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: next-zeo/package-lock.json

      - name: Apply surgical fixes
        run: python3 next-zeo/scripts/apply-admin-phase-1-5-fixes.py

      - name: Install dependencies
        working-directory: next-zeo
        run: npm ci

      - name: Run regression tests
        working-directory: next-zeo
        run: npm run test:regression

      - name: Run strict lint
        id: lint
        working-directory: next-zeo
        run: |
          set -o pipefail
          npm run lint:strict 2>&1 | tee ../lint-output.txt

      - name: Upload lint diagnostics
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: admin-phase-lint-output
          path: lint-output.txt
          retention-days: 1

      - name: Run typecheck
        working-directory: next-zeo
        run: npm run typecheck

      - name: Build application
        working-directory: next-zeo
        run: npm run build

      - name: Commit validated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: close admin phase 1-5 integrity gaps"
          git push origin HEAD:agent/admin-phase-1-5-fixes

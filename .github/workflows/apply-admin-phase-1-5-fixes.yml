name: Apply admin phase 1-5 fixes

on:
  push:
    branches:
      - agent/admin-phase-1-5-fixes
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

concurrency:
  group: admin-phase-1-5-fixes
  cancel-in-progress: false

jobs:
  apply-and-validate:
    if: github.head_ref == 'agent/admin-phase-1-5-fixes' || github.ref_name == 'agent/admin-phase-1-5-fixes'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_URL: http://localhost:3000
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: zeo_ci
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: zeo_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/admin-phase-1-5-fixes
          fetch-depth: 0

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: next-zeo/package-lock.json

      - name: Apply surgical fixes
        run: |
          python3 next-zeo/scripts/apply-admin-phase-1-5-fixes.py
          python3 next-zeo/scripts/refine-admin-phase-1-5-fixes.py

      - name: Install dependencies
        working-directory: next-zeo
        run: npm ci

      - name: Initialize test database
        working-directory: next-zeo
        run: |
          mysql -h 127.0.0.1 -uroot -proot zeo_ci < src/server/db/migrations/001_initial_schema.sql
          mysql -h 127.0.0.1 -uroot -proot zeo_ci < src/server/db/migrations/002_uploaded_files_registry_fields.sql
          mysql -h 127.0.0.1 -uroot -proot zeo_ci < src/server/db/migrations/003_admin_audit_logs.sql

      - name: Run regression tests
        working-directory: next-zeo
        run: npm run test:regression

      - name: Run lint
        working-directory: next-zeo
        run: npm run lint

      - name: Run typecheck
        working-directory: next-zeo
        run: npm run typecheck

      - name: Build application
        working-directory: next-zeo
        run: npm run build

      - name: Commit validated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: close admin phase 1-5 integrity gaps"
          git push origin HEAD:agent/admin-phase-1-5-fixes

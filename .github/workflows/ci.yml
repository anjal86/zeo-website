name: Next.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, test and build
    runs-on: ubuntu-latest
    env:
      APP_URL: http://localhost:3000
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: zeo_ci
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: zeo_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: next-zeo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: next-zeo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Initialize test database
        run: |
          mysql -h 127.0.0.1 -uroot -proot zeo_ci < src/server/db/migrations/001_initial_schema.sql
          mysql -h 127.0.0.1 -uroot -proot zeo_ci < src/server/db/migrations/002_uploaded_files_registry_fields.sql
          mysql -h 127.0.0.1 -uroot -proot zeo_ci < src/server/db/migrations/003_admin_audit_logs.sql
          mysql -h 127.0.0.1 -uroot -proot zeo_ci < src/server/db/migrations/004_blog_seo_system.sql

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Regression tests
        run: npm run test:regression

      - name: Build
        run: npm run build

      - name: Package production release
        if: github.event_name != 'pull_request'
        run: bash scripts/pack-standalone.sh

      - name: Upload cPanel release
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: cpanel-release-${{ github.sha }}
          path: next-zeo/cpanel-deploy.zip
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy verified release to cPanel
    needs: verify
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.CPANEL_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    concurrency:
      group: zeo-production-cpanel
      cancel-in-progress: false
    env:
      CPANEL_FTP_HOST: ${{ vars.CPANEL_FTP_HOST || vars.CPANEL_HOST }}
      CPANEL_FTP_PORT: ${{ vars.CPANEL_FTP_PORT || '21' }}
      CPANEL_FTP_USER: ${{ vars.CPANEL_FTP_USER }}
      CPANEL_FTP_ROOT: ${{ vars.CPANEL_FTP_ROOT || '.' }}
      CPANEL_SITE_URL: ${{ vars.CPANEL_SITE_URL }}
      CPANEL_DEPLOY_WEBHOOK_URL: ${{ vars.CPANEL_DEPLOY_WEBHOOK_URL }}

    steps:
      - name: Download verified release
        uses: actions/download-artifact@v4
        with:
          name: cpanel-release-${{ github.sha }}

      - name: Validate deployment configuration
        env:
          FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          WEBHOOK_SECRET: ${{ secrets.CPANEL_DEPLOY_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          : "${CPANEL_FTP_HOST:?Set repository variable CPANEL_FTP_HOST}"
          : "${CPANEL_FTP_USER:?Set repository variable CPANEL_FTP_USER}"
          : "${CPANEL_SITE_URL:?Set repository variable CPANEL_SITE_URL}"
          : "${CPANEL_DEPLOY_WEBHOOK_URL:?Set repository variable CPANEL_DEPLOY_WEBHOOK_URL}"
          : "${FTP_PASSWORD:?Set secret CPANEL_FTP_PASSWORD}"
          : "${WEBHOOK_SECRET:?Set secret CPANEL_DEPLOY_WEBHOOK_SECRET}"
          [[ "$CPANEL_FTP_PORT" =~ ^[0-9]+$ ]] || { echo "CPANEL_FTP_PORT must be numeric"; exit 1; }
          [[ "$CPANEL_FTP_ROOT" =~ ^[A-Za-z0-9._/-]+$ ]] || { echo "CPANEL_FTP_ROOT contains unsupported characters"; exit 1; }
          [[ "$CPANEL_SITE_URL" =~ ^https:// ]] || { echo "CPANEL_SITE_URL must use HTTPS"; exit 1; }
          [[ "$CPANEL_DEPLOY_WEBHOOK_URL" =~ ^https:// ]] || { echo "CPANEL_DEPLOY_WEBHOOK_URL must use HTTPS"; exit 1; }

      - name: Install FTPS client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Upload release archive through FTPS
        env:
          FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
        run: |
          set -euo pipefail
          remote_root=${CPANEL_FTP_ROOT%/}
          remote_incoming="$remote_root/.deploy/incoming"
          uploaded=false

          for attempt in 1 2 3; do
            echo "Uploading release archive (attempt $attempt of 3)"
            if timeout 300s lftp \
              -u "$CPANEL_FTP_USER,$FTP_PASSWORD" \
              -p "$CPANEL_FTP_PORT" "$CPANEL_FTP_HOST" \
              -e "set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate yes; set net:timeout 20; set net:max-retries 2; cd '$remote_incoming'; rm -f '${GITHUB_SHA}.zip.part'; put cpanel-deploy.zip -o '${GITHUB_SHA}.zip.part'; mv '${GITHUB_SHA}.zip.part' '${GITHUB_SHA}.zip'; bye"; then
              uploaded=true
              break
            fi

            echo "Upload attempt $attempt failed; retrying..."
            sleep $((attempt * 10))
          done

          [[ "$uploaded" == true ]] || { echo "Release upload failed after 3 attempts"; exit 1; }

      - name: Run migrations and publish release
        env:
          WEBHOOK_SECRET: ${{ secrets.CPANEL_DEPLOY_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          archive_sha=$(sha256sum cpanel-deploy.zip | awk '{print $1}')
          body=$(jq -cn --arg action deploy --arg sha "$GITHUB_SHA" --arg checksum "$archive_sha" '{action:$action,sha:$sha,checksum:$checksum}')
          timestamp=$(date +%s)
          signature=$(BODY="$body" TIMESTAMP="$timestamp" WEBHOOK_SECRET="$WEBHOOK_SECRET" python3 -c 'import hashlib,hmac,os; print(hmac.new(os.environ["WEBHOOK_SECRET"].encode(), (os.environ["TIMESTAMP"]+"."+os.environ["BODY"]).encode(), hashlib.sha256).hexdigest())')
          curl --fail-with-body --silent --show-error --max-time 430 \
            -X POST \
            -H 'Content-Type: application/json' \
            -H "X-Zeo-Timestamp: $timestamp" \
            -H "X-Zeo-Signature: $signature" \
            --data "$body" \
            "$CPANEL_DEPLOY_WEBHOOK_URL"

      - name: Verify production and roll back on failure
        env:
          WEBHOOK_SECRET: ${{ secrets.CPANEL_DEPLOY_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          healthy=false
          HEALTH_URL="${CPANEL_SITE_URL%/}/api/health"
          for attempt in $(seq 1 12); do
            response=$(curl --fail --silent --show-error --location --max-time 20 "$HEALTH_URL" || true)
            status=$(printf '%s' "$response" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("status", ""))' 2>/dev/null || true)
            release=$(printf '%s' "$response" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("release", ""))' 2>/dev/null || true)
            if [[ "$status" == "ok" && "$release" == "$GITHUB_SHA" ]]; then
              healthy=true
              break
            fi
            echo "Health check attempt $attempt returned status=${status:-invalid} release=${release:-unknown}; retrying..."
            sleep 10
          done

          if [[ "$healthy" != true ]]; then
            echo "Production did not report the expected healthy release. Rolling back."
            body=$(jq -cn --arg action rollback --arg sha "$GITHUB_SHA" '{action:$action,sha:$sha,checksum:""}')
            timestamp=$(date +%s)
            signature=$(BODY="$body" TIMESTAMP="$timestamp" WEBHOOK_SECRET="$WEBHOOK_SECRET" python3 -c 'import hashlib,hmac,os; print(hmac.new(os.environ["WEBHOOK_SECRET"].encode(), (os.environ["TIMESTAMP"]+"."+os.environ["BODY"]).encode(), hashlib.sha256).hexdigest())')
            curl --fail-with-body --silent --show-error --max-time 240 \
              -X POST \
              -H 'Content-Type: application/json' \
              -H "X-Zeo-Timestamp: $timestamp" \
              -H "X-Zeo-Signature: $signature" \
              --data "$body" \
              "$CPANEL_DEPLOY_WEBHOOK_URL"
            exit 1
          fi

      - name: Deployment summary
        run: |
          {
            echo "## cPanel deployment complete"
            echo ""
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Site: $CPANEL_SITE_URL"
            echo "- Build ran on GitHub; cPanel received the standalone release over FTPS."
            echo "- A signed HTTPS webhook activated the release without SSH."
            echo "- Pending database migrations ran before Passenger restart."
            echo "- Production health confirmed the exact deployed commit."
          } >> "$GITHUB_STEP_SUMMARY"

server {
    listen 80;
    server_name zeo.salomtech.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zeo.salomtech.com;

    ssl_certificate /etc/letsencrypt/live/zeo.salomtech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zeo.salomtech.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Uploads - served from local storage
    location /uploads/ {
        alias /var/www/zeo/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js reverse proxy
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Body size for image uploads
        client_max_body_size 50M;
    }

    # Health check
    location /api/health {
        proxy_pass http://127.0.0.1:3000/api/health;
        access_log off;
    }
}